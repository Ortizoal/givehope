services:
  # PHP-FPM (Laravel API)
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: donation_php
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - donation_net

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: donation_nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/html/public
    depends_on:
      - php
    networks:
      - donation_net

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: donation_mysql
    environment:
      MYSQL_DATABASE: donation_db
      MYSQL_USER: donation_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - donation_net

  # React frontend (dev server)
  frontend:
    image: node:20-alpine
    container_name: donation_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_STRIPE_KEY=${VITE_STRIPE_KEY:-pk_test_placeholder}
    networks:
      - donation_net

  # Mailhog (local email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: donation_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - donation_net

volumes:
  mysql_data:

networks:
  donation_net:
    driver: bridge
